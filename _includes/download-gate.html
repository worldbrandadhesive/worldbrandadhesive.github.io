<div class="modal fade" id="downloadGateModal" tabindex="-1"
     data-title-prefix="{{ site.data.l10n.dl_modal_title }}"
     aria-labelledby="downloadGateLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: var(--radius-lg); border: 1px solid var(--border-light);">
      <div class="modal-header" style="border-bottom: 1px solid var(--border-light);">
        <h5 class="modal-title" id="downloadGateLabel" style="font-family: 'Playfair Display', Georgia, serif; color: var(--green-deep);">{{ site.data.l10n.dl_modal_title }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p style="font-size: 0.9rem; color: var(--text-muted);">{{ site.data.l10n.dl_modal_description }}</p>
        <div id="dl-error" class="alert alert-danger d-none" role="alert" style="font-size: 0.875rem;"></div>
        <form id="download-gate-form" novalidate>
          <div class="mb-3">
            <label for="dl-name" class="form-label">{{ site.data.l10n.dl_name }}</label>
            <input type="text" class="form-control" id="dl-name" name="Name" required autocomplete="name">
          </div>
          <div class="mb-3">
            <label for="dl-email" class="form-label">{{ site.data.l10n.email }}</label>
            <input type="email" class="form-control" id="dl-email" name="Email" required autocomplete="email">
          </div>
          <div class="mb-3">
            <label for="dl-company" class="form-label">{{ site.data.l10n.company }}</label>
            <input type="text" class="form-control" id="dl-company" name="Company" required autocomplete="organization">
          </div>
          <div class="mb-3">
            <label for="dl-phone" class="form-label">{{ site.data.l10n.phone }}</label>
            <input type="tel" class="form-control" id="dl-phone" name="Phone" required autocomplete="tel">
          </div>
          <input type="hidden" id="dl-document" name="Document">
          <input type="hidden" id="dl-product" name="Product">
        </form>
      </div>
      <div class="modal-footer" style="border-top: 1px solid var(--border-light);">
        <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">{{ site.data.l10n.dl_cancel }}</button>
        <button type="submit" form="download-gate-form" class="btn btn-primary" id="download-gate-submit">
          <i class="bi bi-download"></i>{{ site.data.l10n.dl_download }}
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var ENDPOINT = 'https://formspree.io/f/xlgaqplv';
  var STORAGE_PREFIX = 'wba_dl_';

  var modal = document.getElementById('downloadGateModal');
  if (!modal) return;

  var form = document.getElementById('download-gate-form');
  var submitBtn = document.getElementById('download-gate-submit');
  var errorBox = document.getElementById('dl-error');
  var docInput = document.getElementById('dl-document');
  var productInput = document.getElementById('dl-product');
  var titlePrefix = modal.dataset.titlePrefix || 'Download';
  var downloadLabel = '<i class="bi bi-download"></i>{{ site.data.l10n.dl_download }}';
  var ERRORS = {
    429:     '{{ site.data.l10n.dl_error_429 }}',
    403:     '{{ site.data.l10n.dl_error_403 }}',
    402:     '{{ site.data.l10n.dl_error_402 }}',
    400:     '{{ site.data.l10n.dl_error_400 }}',
    default: '{{ site.data.l10n.dl_error_default }}',
    network: '{{ site.data.l10n.dl_error_network }}'
  };

  function storageKey(productName) {
    return STORAGE_PREFIX + productName.replace(/\W+/g, '_');
  }

  var EXPIRY_MS = 30 * 24 * 60 * 60 * 1000; // 30 days

  function hasSubmitted(productName) {
    try {
      var raw = localStorage.getItem(storageKey(productName));
      if (!raw) return false;
      return (Date.now() - parseInt(raw, 10)) < EXPIRY_MS;
    } catch (e) { return false; }
  }

  function markSubmitted(productName) {
    try { localStorage.setItem(storageKey(productName), String(Date.now())); } catch (e) {}
  }

  function triggerDownload(url) {
    var a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.remove('d-none');
  }

  function clearError() {
    errorBox.textContent = '';
    errorBox.classList.add('d-none');
  }

  function errorForStatus(status) {
    return ERRORS[status] || ERRORS.default;
  }

  modal.addEventListener('show.bs.modal', function (e) {
    var btn = e.relatedTarget;
    var productName = btn.dataset.productName || '';
    var downloadUrl = btn.dataset.downloadUrl || '';

    if (productName && hasSubmitted(productName)) {
      e.preventDefault();
      triggerDownload(downloadUrl);
      return;
    }

    docInput.value = btn.dataset.downloadLabel || '';
    productInput.value = productName;
    form.dataset.url = downloadUrl;
    document.getElementById('downloadGateLabel').textContent = titlePrefix + ' ' + (btn.dataset.downloadLabel || '');
  });

  modal.addEventListener('hidden.bs.modal', function () {
    form.reset();
    form.classList.remove('was-validated');
    clearError();
    submitBtn.disabled = false;
    submitBtn.innerHTML = downloadLabel;
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearError();
    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sending…';

    try {
      var res = await fetch(ENDPOINT, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' }
      });

      if (res.ok) {
        markSubmitted(productInput.value);
        triggerDownload(form.dataset.url);
        bootstrap.Modal.getInstance(modal).hide();
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = downloadLabel;
        showError(errorForStatus(res.status));
      }
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.innerHTML = downloadLabel;
      showError(ERRORS.network);
    }
  });
})();
</script>
